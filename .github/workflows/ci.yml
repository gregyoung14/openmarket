name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: cargo check + clippy + fmt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check --workspace --all-targets
        run: cargo check --workspace --all-targets --locked

      - name: cargo clippy --workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace --locked

  python:
    name: python compile + hf sample validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/**/requirements*.txt', '**/pyproject.toml') }}

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarrow huggingface_hub pandas numpy

      - name: Compile all scripts
        run: |
          python -m compileall -q scripts/datasets scripts/hf || true
          python -m py_compile scripts/datasets/*.py scripts/hf/*.py

      - name: Validate HF sample split
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/hf/validate_sample_split.py