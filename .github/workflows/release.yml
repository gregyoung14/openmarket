name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches Cargo workspace version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          WORKSPACE_VERSION=$(grep -E '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "tag=$VERSION  workspace=$WORKSPACE_VERSION"
          test "$VERSION" = "$WORKSPACE_VERSION"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false

  hf-dataset-version:
    name: Tag HF dataset version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Tag dataset repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          tag = os.environ["TAG"]
          for repo, rtype in [
              ("gregyoung14/openmarket-btc-polymarket", "dataset"),
              ("gregyoung14/openmarket-models", "model"),
          ]:
              try:
                  api.create_tag(repo_id=repo, repo_type=rtype, tag=tag, tag_type="release")
                  print(f"tagged {repo} -> {tag}")
              except Exception as e:
                  print(f"skip {repo}: {e}")
          PY