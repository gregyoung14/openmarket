name: Feature request
description: Suggest a new feature or improvement
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the change you'd like and why it matters for OpenMarket.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is the user-facing problem this would solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: |
        Links to relevant docs, papers, prior art, or related issues/PRs.
    validations:
      required: false