# Log rotation for openmarket services
# Runs via user crontab — see scripts/rotate-logs.sh
#
# Uses copytruncate because systemd append: holds open file handles.
# Keeps 3 rotated copies (~300MB cap per log at 100MB max size).

/var/log/polymarket/polymarket.log
/var/log/polymarket/binance.log
/var/log/polymarket/signal_engine.log
/var/log/polymarket/execution-engine.log
/var/log/polymarket/market-data-recorder.log
/var/log/polymarket/redeem-positions.log
/var/log/polymarket/ml_bridge.log
{
    size 100M
    rotate 3
    copytruncate
    compress
    delaycompress
    missingok
    notifempty
    dateext
    dateformat -%Y%m%d-%H%M%S
}
